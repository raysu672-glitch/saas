            font-size: 2rem;

    <div class="container">
        <!-- Start Screen -->
        <div class="card start-screen" id="startScreen">
            <h1>🎧 英语听写测试</h1>
            <p class="subtitle">2400词词表随机练习</p>

            <div class="info-box">
                <h3>📋 测试说明</h3>
                <ul>
                    <li>系统将随机抽取 <strong>50个单词</strong></li>
                    <li>每个单词会播放<strong>一次</strong>英文发音</li>
                    <li>你需要在输入框中<strong>拼写</strong>听到的单词</li>
                    <li>点击"播放"按钮可<strong>重播</strong>发音</li>
                    <li>提交后可查看成绩并<strong>下载错误列表</strong></li>
                </ul>
            </div>

            <button class="btn" onclick="startTest()">开始测试</button>
        </div>

        <!-- Test Screen -->
        <div class="card test-screen" id="testScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-counter" id="questionCounter">第 1 / 50 题</div>

            <div class="status-icon" id="statusIcon">🔊</div>

            <div class="timer-display" id="timerDisplay">准备中...</div>

            <div class="input-group">
                <label for="answerInput">请输入你听到的单词：</label>
                <input type="text" id="answerInput" placeholder="输入单词..." autocomplete="off" onkeypress="handleKeyPress(event)">
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="skipWord()">跳过</button>
                <button class="btn" onclick="submitAnswer()">提交</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="card results-screen" id="resultsScreen">
            <h1>📊 测试完成！</h1>

            <div class="score-display" id="scoreDisplay">0%</div>
            <p class="score-label">正确率</p>

            <div class="stats-grid">
                <div class="stat-box correct">
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-box incorrect">
                    <div class="stat-value" id="incorrectCount">0</div>
                    <div class="stat-label">错误</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="skippedCount">0</div>
                    <div class="stat-label">跳过</div>
                </div>
            </div>

            <div class="error-list" id="errorList">
                <h3>❌ 错误/跳过单词</h3>
                <div id="errorItems"></div>
            </div>

            <div class="action-buttons">
                <button class="btn" onclick="downloadResults()">📥 下载结果</button>
                <button class="btn btn-success" onclick="restartTest()">🔄 再来一次</button>
            </div>
        </div>
    </div>

        let selectedWords = [];
        let currentIndex = 0;
        let results = [];
        let timerInterval = null;
        let timeLeft = 6;
        let isPlaying = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('testScreen').style.display = 'block';

            // Select 50 random words
            selectedWords = shuffleArray(allWords).slice(0, 50);
            currentIndex = 0;
            results = [];

            showQuestion();
        }

        function showQuestion() {
            const word = selectedWords[currentIndex];
            document.getElementById('questionCounter').textContent = `第 ${currentIndex + 1} / 50 题`;
            document.getElementById('progressFill').style.width = `${((currentIndex + 1) / 50) * 100}%`;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').className = '';
            document.getElementById('timerDisplay').textContent = '准备中...';
            document.getElementById('timerDisplay').className = 'timer-display';
            document.getElementById('statusIcon').className = 'status-icon';

            // Auto-play the word once
            playWord();
        }

        function playWord() {
            if (isPlaying) return;

            const word = selectedWords[currentIndex];
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;

            const statusIcon = document.getElementById('statusIcon');
            statusIcon.className = 'status-icon playing';
            isPlaying = true;

            utterance.onend = () => {
                statusIcon.className = 'status-icon';
                isPlaying = false;
                startTimer();
            };

            speechSynthesis.speak(utterance);
        }

        function startTimer() {
            timeLeft = 6;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerDisplay').textContent = '时间到！';
                    // 自动跳到下一题
                    setTimeout(() => {
                        results.push({
                            word: selectedWords[currentIndex],
                            userAnswer: document.getElementById('answerInput').value.trim() || '(未作答)',
                            isCorrect: false,
                            skipped: true
                        });
                        nextQuestion();
                    }, 800);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timerDisplay');
            display.textContent = `剩余 ${timeLeft} 秒`;
            display.className = timeLeft <= 2 ? 'timer-display warning' : 'timer-display';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitAnswer();
            }
        }

        function submitAnswer() {
            const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
            const correctAnswer = selectedWords[currentIndex].toLowerCase();
            const isCorrect = userAnswer === correctAnswer;

            clearInterval(timerInterval);

            const input = document.getElementById('answerInput');
            input.classList.add(isCorrect ? 'correct' : 'incorrect');

            results.push({
                word: selectedWords[currentIndex],
                userAnswer: userAnswer || '(未作答)',
                isCorrect: isCorrect,
                skipped: false
            });

            setTimeout(() => {
                nextQuestion();
            }, 1000);
        }

        function skipWord() {
            clearInterval(timerInterval);

            results.push({
                word: selectedWords[currentIndex],
                userAnswer: '(跳过)',
                isCorrect: false,
                skipped: true
            });

            nextQuestion();
        }

        function nextQuestion() {
            currentIndex++;

            if (currentIndex >= 50) {
                showResults();
            } else {
                showQuestion();
            }
        }

        function showResults() {
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';

            const correctCount = results.filter(r => r.isCorrect).length;
            const incorrectCount = results.filter(r => !r.isCorrect && !r.skipped).length;
            const skippedCount = results.filter(r => r.skipped).length;
            const score = Math.round((correctCount / 50) * 100);

            document.getElementById('scoreDisplay').textContent = `${score}%`;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('incorrectCount').textContent = incorrectCount;
            document.getElementById('skippedCount').textContent = skippedCount;

            // Show error list
            const errorItems = document.getElementById('errorItems');
            const errors = results.filter(r => !r.isCorrect);

            if (errors.length === 0) {
                errorItems.innerHTML = '<p style="color: #28a745; padding: 20px;">🎉 太棒了！全部正确！</p>';
            } else {
                errorItems.innerHTML = errors.map(e => `
                    <div class="error-item">
                        <div>
                            <span class="word">${e.word}</span>
                            ${e.skipped ? '<span style="color: #ffc107; margin-left: 10px;">(跳过)</span>' : ''}
                        </div>
                        <div>
                            <span class="your-answer">你的答案: ${e.userAnswer}</span>
                            <span style="margin: 0 10px;">→</span>
                            <span class="correct-answer">正确答案: ${e.word}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function downloadResults() {
            const correctCount = results.filter(r => r.isCorrect).length;
            const skippedCount = results.filter(r => r.skipped).length;
            const incorrectCount = results.filter(r => !r.isCorrect && !r.skipped).length;
            const score = Math.round((correctCount / 50) * 100);

            const errors = results.filter(r => !r.isCorrect);

            let content = `英语听写测试结果\n`;
            content += `========================\n\n`;
            content += `测试时间: ${new Date().toLocaleString('zh-CN')}\n`;
            content += `总分: ${score}%\n`;
            content += `正确: ${correctCount} 题\n`;
            content += `错误: ${incorrectCount} 题\n`;
            content += `跳过: ${skippedCount} 题\n\n`;

            if (errors.length > 0) {
                content += `错误/跳过单词列表:\n`;
                content += `------------------------\n`;
                errors.forEach((e, index) => {
                    content += `${index + 1}. ${e.word} (你的答案: ${e.userAnswer})\n`;
                });
            }

            content += `\n\n单词列表:\n`;
            content += `------------------------\n`;
            results.forEach((r, index) => {
                const status = r.isCorrect ? '✓' : (r.skipped ? '跳过' : '✗');
                content += `${index + 1}. [${status}] ${r.word}\n`;
            });

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `听写测试结果_${new Date().toISOString().slice(0,10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function restartTest() {
            document.getElementById('resultsScreen').style.display = 'none';
            startTest();
        }
